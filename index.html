<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hoard SafraBr</title>
  <link rel="apple-touch-icon" sizes="180x180" href="favicon_io/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png">
  <link rel="icon" href="favicon_io/favicon.ico" sizes="any">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Hoard SafraBr</h1>
    <p class="subtitle">
      <span data-i18n="subtitlePrefix">Catalogo de Itens do</span>
      <a href="https://www.roblox.com/pt/games/2772610559/Farming-and-Friends" target="_blank" rel="noopener noreferrer">Farming and Friends</a>
    </p>

    <div class="controls">
      <div class="controls-search">
        <input type="text" id="searchInput" placeholder="Buscar item..." data-i18n-placeholder="searchPlaceholder">
        <button id="clearSearchBtn" class="clear-search-btn" type="button" aria-label="Limpar busca" title="Limpar busca">&times;</button>
      </div>

      <div class="controls-filters">
        <select id="categoryFilter">
          <option value="All" data-category-key="All">Todas as categorias</option>
          <option value="TreeCutters" data-category-key="TreeCutters">Cortadores de Árvores</option>
          <option value="Tractors" data-category-key="Tractors">Tratores</option>
          <option value="Plows" data-category-key="Plows">Arados</option>
          <option value="Cultivators" data-category-key="Cultivators">Cultivadores</option>
          <option value="Seeders" data-category-key="Seeders">Plantadeiras</option>
          <option value="SeedBoxes" data-category-key="SeedBoxes">Caixas de Sementes</option>
          <option value="Harvesters" data-category-key="Harvesters">Colheitadeiras</option>
          <option value="Trucks" data-category-key="Trucks">Caminhoes</option>
          <option value="Trailers" data-category-key="Trailers">Reboques</option>
          <option value="Misc" data-category-key="Misc">Diversos</option>
        </select>

        <label class="filter-toggle" for="specialFilter">
          <input type="checkbox" id="specialFilter" checked>
          <span class="toggle-ui" aria-hidden="true">
            <span class="toggle-knob"></span>
          </span>
          <span data-i18n="specialOnlyLabel">Somente itens especiais</span>
        </label>

        <select id="languageSwitch" aria-label="Idioma">
          <option value="pt-BR">🇧🇷 Português</option>
          <option value="en">🇺🇸 English</option>
        </select>
      </div>
    </div>
  </header>

  <main>
    <div class="content-wrap">
      <p id="resultsCount" class="results-count" aria-live="polite"></p>
      <div id="itemsContainer" class="items-grid"></div>
    </div>
  </main>

  <footer class="site-footer">
    <span data-i18n="footerCreditPrefix">Criado por</span>
    <a href="https://www.roblox.com/pt/catalog?taxonomy=tZsUsd2BqGViQrJ9Vs3Wah&CreatorName=The_TerminaDO&CreatorType=User&salesTypeFilter=1" target="_blank" rel="noopener noreferrer">VoZona</a>
  </footer>

  <nav class="quick-links" aria-label="Atalhos">
    <a class="quick-link quick-link--discord" href="https://discord.gg/bnPmCjyChx" target="_blank" rel="noopener noreferrer" aria-label="Discord" title="Discord">
      <svg class="quick-link-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M4 6h16a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H8l-4 3v-3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
      </svg>
      <span class="quick-link-label">Discord</span>
    </a>
    <a class="quick-link quick-link--shop" href="https://www.roblox.com/catalog" target="_blank" rel="noopener noreferrer" aria-label="Camisa oficial" title="Camisa oficial">
      <svg class="quick-link-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M8 5l4 2 4-2 3 3-2 3v8H7v-8L5 8l3-3z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
      </svg>
      <span class="quick-link-label">Camisa oficial</span>
    </a>
    <a class="quick-link quick-link--youtube" href="https://www.youtube.com/vozona" target="_blank" rel="noopener noreferrer" aria-label="YouTube" title="YouTube">
      <svg class="quick-link-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M22 12s0-3-0.8-4.2c-0.4-0.7-1.1-1.2-1.9-1.3C17.8 6 12 6 12 6s-5.8 0-7.3 0.5c-0.8 0.1-1.5 0.6-1.9 1.3C2 9 2 12 2 12s0 3 0.8 4.2c0.4 0.7 1.1 1.2 1.9 1.3C6.2 18 12 18 12 18s5.8 0 7.3-0.5c0.8-0.1 1.5-0.6 1.9-1.3C22 15 22 12 22 12z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
        <path d="M10 9.6v4.8l4-2.4-4-2.4z" fill="currentColor"></path>
      </svg>
      <span class="quick-link-label">YouTube</span>
    </a>
  </nav>

  <button id="backToTopBtn" class="back-to-top" type="button" aria-label="Voltar ao topo" title="Voltar ao topo">&uarr;</button>

  <script src="script.js"></script>
</body>
</html>
